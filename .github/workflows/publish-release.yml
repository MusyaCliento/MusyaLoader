name: Publish Release
on:
  push:
    tags:
      - '*'  # было v*, теперь ловит 0.37.1.44 и подобные

jobs:
  build-windows-bootstrap:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      - name: Publish bootstrap
        working-directory: SS14.Launcher.Bootstrap
        run: dotnet publish -r win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          retention-days: 1
          path: "SS14.Launcher.Bootstrap/bin/Release/net10.0-windows/win-x64/publish/MusyaLoader.exe"  # исправлено имя

  build:
    runs-on: ubuntu-latest
    needs: build-windows-bootstrap
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      - name: Download Windows Bootstrap
        uses: actions/download-artifact@v4  # было v5, исправлено на v4
        with:
          name: bootstrap
      - name: Create builds
        run: |
          python ./publish.py windows --x64-only
          python ./publish.py linux --x64-only
          python ./publish.py osx --x64-only
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
      - name: Upload Linux
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./MusyaLoader_Linux.zip  # исправлено имя
          asset_name: MusyaLoader_Linux.zip
          asset_content_type: application/zip
      - name: Upload Windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./MusyaLoader_Windows.zip  # исправлено имя
          asset_name: MusyaLoader_Windows.zip
          asset_content_type: application/zip
      - name: Upload macOS
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./MusyaLoader_macOS.zip  # исправлено имя
          asset_name: MusyaLoader_macOS.zip
          asset_content_type: application/zip
